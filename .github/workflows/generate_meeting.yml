name: Generate Weekly Meeting File

on:
  # Runs every Tuesday at 8:00 AM ET (12:00 UTC).
  # Generates the FOLLOWING Tuesday's meeting file so members have
  # a full week to propose agenda items before the meeting.
  # If the file already exists the script exits silently — no duplicate PRs.
  schedule:
    - cron: "0 12 * * 2"

  # Also allows manual trigger from the GitHub Actions tab.
  # Optionally specify any future date (YYYY-MM-DD).
  # Leave blank to use the same default as the cron job (next-next Tuesday).
  workflow_dispatch:
    inputs:
      meeting_date:
        description: "Meeting date to generate (YYYY-MM-DD). Leave blank for one week ahead."
        required: false
        default: ""

jobs:
  generate-meeting:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # needed to commit the new file back to the repo
      pull-requests: write  # needed to open a PR

    steps:
      # ── 1. Check out the repo ───────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main           # always generate from main branch

      # ── 2. Set up Python ────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Run the generation script ────────────────────────────────────
      #    If the file already exists the script exits with code 0 and
      #    the create-pull-request step produces no changes — no PR opened.
      - name: Generate meeting file
        run: |
          if [ -n "${{ github.event.inputs.meeting_date }}" ]; then
            python scripts/generate_meeting.py "${{ github.event.inputs.meeting_date }}"
          else
            python scripts/generate_meeting.py
          fi

      # ── 4. Commit and open a PR ─────────────────────────────────────────
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "agenda: add next meeting file"
          branch: "auto/meeting-$(date +'%Y-%m-%d')"
          title: "📅 New Meeting File — Next Tuesday"
          body: |
            This PR was auto-generated by the **Generate Weekly Meeting File** workflow.

            ### What's included
            - New meeting Markdown file in `TSC Meeting Planner and Tracker/meetings/`
            - Updated `Next Meeting` link in `README.md`

            ### Next steps before merging
            - [ ] Create the matching GitHub Milestone under Issues → Milestones
            - [ ] Update the Milestone number in the meeting file if needed
            - [ ] Review and adjust the agenda template as needed
            - [ ] Merge this PR to make the file visible to all members
          labels: "agenda-item"
          draft: false